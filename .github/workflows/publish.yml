name: Publish to PyPI

# Publishes to PyPI when a version tag is pushed (e.g. v1.0.0), using PyPI
# Trusted Publishing (OIDC) — no API tokens or secrets are stored in the repo.
#
# One-time PyPI setup (https://pypi.org/manage/account/publishing/):
#   - PyPI Project Name: certbot-dns-nicmanager
#   - Owner:             jp1337
#   - Repository name:   certbot-dns-nicmanager
#   - Workflow name:     publish.yml
#   - Environment name:  pypi

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install (with test extras)
        run: |
          python -m pip install --upgrade pip build
          pip install -e '.[test]'
      - name: Test (do not publish broken builds)
        run: pytest
      - name: Build sdist + wheel
        run: python -m build
      - name: Check metadata
        run: |
          pip install twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
