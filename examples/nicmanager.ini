# Example nicmanager credentials for certbot-dns-nicmanager.
#
# Copy this file, fill in your real values, and protect it:
#   cp examples/nicmanager.ini ~/.secrets/certbot/nicmanager.ini
#   chmod 600 ~/.secrets/certbot/nicmanager.ini
#
# Use a dedicated API-ACME account (restricted to managing the
# _acme-challenge TXT record) and disable two-factor authentication on it.

# Either "login.username" or the account email address.
dns_nicmanager_username = mylogin.acmeuser

# The API password / token for that user.
# Quote it if it contains '#' — an unquoted '#' starts an INI comment.
dns_nicmanager_password = "0123456789abcdef0123456789abcdef"

# Optional. Defaults to https://api.nicmanager.com/v1
# dns_nicmanager_endpoint = https://api.nicmanager.com/v1

# Optional. Skip automatic zone detection and always use this zone.
# Useful for locked-down accounts that cannot read zone metadata.
# dns_nicmanager_zone = example.com
